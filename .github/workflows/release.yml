name: Release

# Manual release: bump "version" in package.json, commit to main, then run this
# workflow from the Actions tab (Run workflow). It builds, tests, packages the
# .vsix, and publishes a GitHub Release tagged v<version> with the .vsix attached.
# No secrets required.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run compile

      - name: Unit tests
        run: npm test

      - name: Build extension + webview
        run: npm run build

      - name: Package VSIX
        run: npm run package

      - name: Read version from package.json
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.pkg.outputs.version }}" \
            "octogon-${{ steps.pkg.outputs.version }}.vsix" \
            --title "Octogon v${{ steps.pkg.outputs.version }}" \
            --generate-notes
